<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票预测分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .content {
            display: flex;
            height: calc(100vh - 200px);
        }

        .list-panel {
            width: 50%;
            border-right: 2px solid #e0e0e0;
            overflow-y: auto;
        }

        .detail-panel {
            width: 50%;
            overflow-y: auto;
            padding: 30px;
            background: #f8f9fa;
        }

        .stock-item {
            padding: 20px 30px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .stock-item:hover {
            background: #f0f4ff;
        }

        .stock-item.active {
            background: #e8f0ff;
            border-left: 4px solid #667eea;
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .stock-code {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .stock-name {
            font-size: 14px;
            color: #666;
            margin-left: 10px;
        }

        .confidence-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .stock-info {
            display: flex;
            gap: 20px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #666;
        }

        .price-targets {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .price-target {
            flex: 1;
            padding: 8px;
            background: white;
            border-radius: 8px;
            text-align: center;
        }

        .price-target-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 4px;
        }

        .price-target-value {
            font-size: 14px;
            font-weight: bold;
        }

        .price-target.positive {
            color: #e74c3c;
        }

        .price-target.negative {
            color: #27ae60;
        }

        .detail-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
        }

        .detail-empty svg {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .detail-content {
            display: none;
        }

        .detail-content.active {
            display: block;
        }

        .detail-header {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .detail-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .detail-meta {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .meta-value {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .section-content {
            font-size: 14px;
            line-height: 1.8;
            color: #555;
        }

        .section-content strong {
            color: #333;
        }

        .reasons-list {
            list-style: none;
            padding: 0;
        }

        .reasons-list li {
            padding: 12px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .reasons-list.bearish li {
            border-left-color: #e74c3c;
        }

        .conclusion {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .conclusion-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .conclusion-text {
            font-size: 14px;
            line-height: 1.8;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>股票预测分析系统</h1>
            <p>长期看涨股票推荐 - 基于AI分析</p>
        </div>
        <div class="content">
            <div class="list-panel" id="stockList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在加载数据...</p>
                </div>
            </div>
            <div class="detail-panel">
                <div class="detail-empty" id="detailEmpty">
                    <svg fill="#999" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                    <p>请从左侧列表选择一只股票查看详情</p>
                </div>
                <div class="detail-content" id="detailContent"></div>
            </div>
        </div>
    </div>

    <script>
        let stocksData = [];
        let currentStock = null;

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('stock_predictions_long_bullish_result.jsonl');
                const text = await response.text();
                const lines = text.trim().split('\n');

                stocksData = lines
                    .map(line => {
                        try {
                            return JSON.parse(line);
                        } catch (e) {
                            return null;
                        }
                    })
                    .filter(stock => stock && stock.quantitative_prediction?.prediction_trend === 'bullish')
                    .map(stock => {
                        // 计算排序分: confidence_score * expected_high相对cur_price的涨幅
                        const curPrice = stock.cur_price || 0;
                        const expectedHigh = stock.quantitative_prediction?.price_target?.expected_high || curPrice;
                        const confidence = stock.quantitative_prediction?.confidence_score || 0;
                        const highChangePercent = curPrice > 0 ? ((expectedHigh - curPrice) / curPrice * 100) : 0;
                        stock.sort_score = confidence * highChangePercent;
                        return stock;
                    })
                    .sort((a, b) => {
                        return (b.sort_score || 0) - (a.sort_score || 0);
                    });

                renderStockList();
            } catch (error) {
                document.getElementById('stockList').innerHTML = `
                    <div class="loading">
                        <p style="color: #e74c3c;">加载失败: ${error.message}</p>
                    </div>
                `;
            }
        }

        // 渲染股票列表
        function renderStockList() {
            const listPanel = document.getElementById('stockList');

            if (stocksData.length === 0) {
                listPanel.innerHTML = '<div class="loading"><p>没有找到符合条件的股票</p></div>';
                return;
            }

            listPanel.innerHTML = stocksData.map((stock, index) => {
                const curPrice = stock.cur_price || 0;
                const expectedLow = stock.quantitative_prediction?.price_target?.expected_low || curPrice;
                const expectedHigh = stock.quantitative_prediction?.price_target?.expected_high || curPrice;

                const lowChange = ((expectedLow - curPrice) / curPrice * 100).toFixed(2);
                const highChange = ((expectedHigh - curPrice) / curPrice * 100).toFixed(2);
                const confidence = stock.quantitative_prediction?.confidence_score || 0;
                const sortScore = stock.sort_score || 0;

                return `
                    <div class="stock-item" onclick="showDetail(${index})">
                        <div class="stock-header">
                            <div>
                                <span class="stock-code">${stock.stock_code}</span>
                                <span class="stock-name">${stock.stock_name}</span>
                            </div>
                            <span class="confidence-badge">排序分: ${sortScore.toFixed(2)}</span>
                        </div>
                        <div class="stock-info">
                            <span>行业: ${stock.company_overview?.sector_and_industry || 'N/A'}</span>
                            <span>当前价: $${curPrice.toFixed(2)}</span>
                            <span>信心度: ${confidence}%</span>
                        </div>
                        <div class="price-targets">
                            <div class="price-target ${parseFloat(lowChange) >= 0 ? 'positive' : 'negative'}">
                                <div class="price-target-label">目标低位</div>
                                <div class="price-target-value">$${expectedLow.toFixed(2)} (${lowChange}%)</div>
                            </div>
                            <div class="price-target ${parseFloat(highChange) >= 0 ? 'positive' : 'negative'}">
                                <div class="price-target-label">目标高位</div>
                                <div class="price-target-value">$${expectedHigh.toFixed(2)} (${highChange}%)</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 显示详情
        function showDetail(index) {
            currentStock = stocksData[index];

            // 更新激活状态
            document.querySelectorAll('.stock-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });

            // 隐藏空状态，显示详情
            document.getElementById('detailEmpty').style.display = 'none';
            const detailContent = document.getElementById('detailContent');
            detailContent.classList.add('active');

            // 渲染详情
            const stock = currentStock;
            const curPrice = stock.cur_price || 0;
            const expectedLow = stock.quantitative_prediction?.price_target?.expected_low || curPrice;
            const expectedHigh = stock.quantitative_prediction?.price_target?.expected_high || curPrice;
            const lowChange = ((expectedLow - curPrice) / curPrice * 100).toFixed(2);
            const highChange = ((expectedHigh - curPrice) / curPrice * 100).toFixed(2);

            detailContent.innerHTML = `
                <div class="detail-header">
                    <div class="detail-title">${stock.stock_code} - ${stock.stock_name}</div>
                    <div class="detail-meta">
                        <div class="meta-item">
                            <div class="meta-label">当前价格</div>
                            <div class="meta-value">$${curPrice.toFixed(2)}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">目标低位</div>
                            <div class="meta-value" style="color: ${parseFloat(lowChange) >= 0 ? '#e74c3c' : '#27ae60'}">
                                $${expectedLow.toFixed(2)} (${lowChange}%)
                            </div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">目标高位</div>
                            <div class="meta-value" style="color: ${parseFloat(highChange) >= 0 ? '#e74c3c' : '#27ae60'}">
                                $${expectedHigh.toFixed(2)} (${highChange}%)
                            </div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">信心度</div>
                            <div class="meta-value">${stock.quantitative_prediction?.confidence_score || 0}%</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">时间框架</div>
                            <div class="meta-value">${stock.timeframe || 'N/A'}</div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">公司概览</div>
                    <div class="section-content">
                        <p><strong>商业模式:</strong> ${stock.company_overview?.business_model || 'N/A'}</p>
                        <br>
                        <p><strong>市场地位:</strong> ${stock.company_overview?.market_position || 'N/A'}</p>
                        <br>
                        <p><strong>行业板块:</strong> ${stock.company_overview?.sector_and_industry || 'N/A'}</p>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">宏观环境</div>
                    <div class="section-content">
                        <p><strong>经济影响:</strong> ${stock.macro_environment?.economic_impact || 'N/A'}</p>
                        <br>
                        <p><strong>地缘政治与监管:</strong> ${stock.macro_environment?.geopolitical_or_regulatory || 'N/A'}</p>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">最新动态</div>
                    <div class="section-content">
                        <p><strong>最新消息:</strong> ${stock.recent_dynamics?.latest_news || 'N/A'}</p>
                        <br>
                        <p><strong>财报表现:</strong> ${stock.recent_dynamics?.earnings_performance || 'N/A'}</p>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">基本面分析</div>
                    <div class="section-content">
                        <p><strong>估值状态:</strong> ${stock.fundamental_analysis?.valuation_status || 'N/A'}</p>
                        <br>
                        <p><strong>成长性与盈利能力:</strong> ${stock.fundamental_analysis?.growth_and_profitability || 'N/A'}</p>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">技术分析</div>
                    <div class="section-content">
                        <p><strong>当前趋势:</strong> ${stock.technical_analysis?.current_trend || 'N/A'}</p>
                        <br>
                        <p><strong>关键指标:</strong> ${stock.technical_analysis?.key_indicators || 'N/A'}</p>
                        <br>
                        <p><strong>支撑与阻力:</strong> ${stock.technical_analysis?.support_and_resistance || 'N/A'}</p>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">看涨理由</div>
                    <ul class="reasons-list">
                        ${(stock.long_term_thesis?.bullish_reasons || []).map(reason => `
                            <li>${reason}</li>
                        `).join('')}
                    </ul>
                </div>

                <div class="section">
                    <div class="section-title">风险因素</div>
                    <ul class="reasons-list bearish">
                        ${(stock.long_term_thesis?.bearish_and_risk_factors || []).map(risk => `
                            <li>${risk}</li>
                        `).join('')}
                    </ul>
                </div>

                <div class="conclusion">
                    <div class="conclusion-title">综合结论</div>
                    <div class="conclusion-text">${stock.final_conclusion || 'N/A'}</div>
                </div>
            `;

            // 滚动到顶部
            detailContent.scrollTop = 0;
        }

        // 初始化
        loadData();
    </script>
</body>
</html>
